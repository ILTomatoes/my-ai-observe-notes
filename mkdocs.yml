site_name: AI 观察日记
site_description: 一个人看文章、用产品、想问题的过程记录
site_url: https://iltomatoes.github.io/my-ai-observe-notes/
repo_url: https://github.com/ILTomatoes/my-ai-observe-notes
repo_name: ILTomatoes/my-ai-observe-notes
edit_uri: ""

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
    - content.action.edit
    - blog.enabled
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 暗黑模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 明亮模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono

nav:
  - 博客:
    - blog/index.md
  - 关于: about.md

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      post_url_format: "{date}/{slug}"
      authors_file: "{blog}/.authors.yml"
      categories: false
      pagination_per_page: 10

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ILTomatoes
