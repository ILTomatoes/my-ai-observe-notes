site_name: AI 观察笔记
site_description: 私人知识门户 · 经脱敏的精选 AI 文章收录与综合
site_url: https://iltomatoes.github.io/my-ai-observe-notes/
repo_url: https://github.com/ILTomatoes/my-ai-observe-notes
repo_name: ILTomatoes/my-ai-observe-notes
edit_uri: ""

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗黑模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到明亮模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono

nav:
  - 首页: index.md
  - 收录:
      - 全部: articles.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ILTomatoes
